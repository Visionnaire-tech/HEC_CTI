{% extends "base.html" %}

{% block content %}
<div class="container mt-4">

    <h4>Bienvenue {{ student.nom }}</h4>

    <div class="card p-3">
        <p><strong>Promotion :</strong> {{ student.promotion }}</p>
        <p><strong>Section :</strong> {{ student.section }}</p>
        <p><strong>Département :</strong> {{ student.department }}</p>
    </div>

    <a href="{% url 'student_result' %}" class="btn btn-success mt-3">
        Voir mes résultats
    </a>

</div>
{% endblock %}
