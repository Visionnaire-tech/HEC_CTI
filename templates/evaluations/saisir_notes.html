{% extends 'base.html' %}

{% block content %}
<h3 class="mb-4">Saisie des notes - {{ course.name }}</h3>

<form method="POST">
    {% csrf_token %}

    <div class="table-responsive">
        <table class="table table-bordered table-striped">
            <thead class="table-dark">
                <tr>
                    <th>Matricule</th>
                    <th>Nom</th>
                    <th>TP</th>
                    <th>Interro</th>
                    <th>Examen</th>
                    <th>Statut</th>
                </tr>
            </thead>
            <tbody>
                {% for student in students %}
                <tr>
                    <td>{{ student.matricule }}</td>
                    <td>{{ student.nom }} {{ student.prenom }}</td>

                    <td>
                        <input type="number" step="0.1" min="0" max="20"
                               name="tp_{{ student.id }}"
                               class="form-control">
                    </td>

                    <td>
                        <input type="number" step="0.1" min="0" max="20"
                               name="interro_{{ student.id }}"
                               class="form-control">
                    </td>

                    <td>
                        <input type="number" step="0.1" min="0" max="20"
                               name="examen_{{ student.id }}"
                               class="form-control">
                    </td>

                    <td>
                        <select name="statut_{{ student.id }}" class="form-control">
                            <option value="normal">Normal</option>
                            <option value="ABS">Absent</option>
                        </select>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <button type="submit" class="btn btn-success">
        💾 Enregistrer les notes
    </button>
</form>

{% endblock %}
