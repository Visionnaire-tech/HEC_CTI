{% extends "base.html" %}

{% block content %}
<div class="container mt-4">

<h3>Importer fichier bancaire</h3>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}

    <input type="file" name="file" class="form-control mb-3" required>

    <button class="btn btn-success">
        Importer
    </button>

</form>

</div>
{% endblock %}
